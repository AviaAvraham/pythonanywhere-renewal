# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python application

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Run renewal
      run: |
        set -e
        python3 -m pip install --user ./
        export XDG_DATA_HOME=/home/runner
        echo "username: ${{ secrets.USERNAME }}" > "$XDG_DATA_HOME/pythonanywhere_credentials.yaml"
        echo "password: ${{ secrets.PASSWORD }}" >> "$XDG_DATA_HOME/pythonanywhere_credentials.yaml"
        # Retry up to 3 times with 60-second waits
        for attempt in {1..3}; do
          echo "Attempt $attempt/3"
          set +e
          pythonanywhere_3_months 2>&1 | tee /tmp/output.log
          result=${PIPESTATUS[0]}
          set -e
          if [[ $result -eq 0 ]]; then
            echo "Success on attempt $attempt"
            exit 0
          elif [[ $attempt -eq 3 ]]; then
            echo "All 3 attempts failed"
            exit 1
          else
            echo "Attempt $attempt failed (exit code $result), waiting 60 seconds before retry..."
            sleep 60
          fi
        done
